project:
  name: reliability-toolkit

storage:
  backend: local
  local:
    path: .reliabilitykit

pytest:
  args: []

capture:
  trace: true
  video: false
  screenshot: true
  logs: true

chaos:
  enabled_default: false
  profiles:
    latency_light:
      mode: latency
      probability: 0.3
      seed: 42
      latency_ms:
        min: 200
        max: 500
      targets:
        - host: api.practicesoftwaretesting.com
          url_pattern: "/products"
          methods: ["GET"]
          resource_types: ["document", "xhr", "fetch"]
        - host: api.practicesoftwaretesting.com
          url_pattern: "/brands"
          methods: ["GET"]
          resource_types: ["document", "xhr", "fetch"]
    checkout_fault:
      mode: mixed
      probability: 0.4
      seed: 42
      status_codes: [500, 503]
      targets:
        - host: api.practicesoftwaretesting.com
          url_pattern: "/users"
          methods: ["GET", "POST"]
          resource_types: ["document", "xhr", "fetch"]

reporting:
  trend_default_window_days: 14

classification:
  ruleset_version: v1
