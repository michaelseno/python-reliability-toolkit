project:
  name: reliability-toolkit

storage:
  backend: local
  local:
    path: .reliabilitykit

pytest:
  args: []

capture:
  trace: true
  video: false
  screenshot: true
  logs: true

chaos:
  enabled_default: false
  profiles:
    latency_light:
      mode: latency
      probability: 0.3
      seed: 42
      latency_ms:
        min: 200
        max: 500
      targets:
        - host: api.practicesoftwaretesting.com
          url_pattern: "/products"
          methods: ["GET"]
          resource_types: ["document", "xhr", "fetch"]
        - host: api.practicesoftwaretesting.com
          url_pattern: "/brands"
          methods: ["GET"]
          resource_types: ["document", "xhr", "fetch"]
    checkout_fault:
      mode: mixed
      probability: 0.4
      seed: 42
      status_codes: [500, 503]
      targets:
        - host: api.practicesoftwaretesting.com
          url_pattern: "/users"
          methods: ["GET", "POST"]
          resource_types: ["document", "xhr", "fetch"]
    rate_limit_burst:
      mode: http_status
      probability: 0.35
      seed: 42
      status_codes: [429]
      targets:
        - host: api.practicesoftwaretesting.com
          url_pattern: "/products"
          methods: ["GET"]
          resource_types: ["xhr", "fetch"]
        - host: api.practicesoftwaretesting.com
          url_pattern: "/search"
          methods: ["GET"]
          resource_types: ["xhr", "fetch"]
    auth_expired:
      mode: http_status
      probability: 0.3
      seed: 42
      status_codes: [401, 403]
      targets:
        - host: api.practicesoftwaretesting.com
          url_pattern: "/users"
          methods: ["GET", "POST", "PATCH"]
          resource_types: ["xhr", "fetch"]
    malformed_json:
      mode: malformed_json
      probability: 0.25
      seed: 42
      status_codes: [200]
      targets:
        - host: api.practicesoftwaretesting.com
          url_pattern: "/products"
          methods: ["GET"]
          resource_types: ["xhr", "fetch"]
    timeout_hang:
      mode: timeout_hang
      probability: 0.25
      seed: 42
      hang_ms: 45000
      targets:
        - host: api.practicesoftwaretesting.com
          url_pattern: "/checkout"
          methods: ["POST"]
          resource_types: ["xhr", "fetch"]
    resource_block:
      mode: abort
      probability: 0.25
      seed: 42
      targets:
        - host: practicesoftwaretesting.com
          url_pattern: "/"
          methods: ["GET"]
          resource_types: ["script", "stylesheet", "font", "image"]
    fail_hard:
      mode: abort
      probability: 1.0
      seed: 42
      targets:
        - host: api.practicesoftwaretesting.com
          url_pattern: "/"
          methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
          resource_types: ["document", "xhr", "fetch"]

reporting:
  trend_default_window_days: 14

classification:
  ruleset_version: v1
