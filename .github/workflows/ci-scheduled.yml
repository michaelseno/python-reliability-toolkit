name: CI Scheduled

on:
  schedule:
    - cron: "0 0,5,10,15,20 * * *"
  workflow_dispatch:

jobs:
  e2e-playwright:
    name: E2E Playwright (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e .

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Decide chaos campaign
        id: chaos_decision
        shell: bash
        run: |
          roll=$((RANDOM % 100))
          if [ "$roll" -lt 30 ]; then
            enable=true
            profiles=(latency_light checkout_fault)
            pick=$((RANDOM % ${#profiles[@]}))
            profile="${profiles[$pick]}"
            seed=$((RANDOM + 1))
          else
            enable=false
            profile=""
            seed=""
          fi

          echo "enable=$enable" >> "$GITHUB_OUTPUT"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "seed=$seed" >> "$GITHUB_OUTPUT"

      - name: Run baseline reliability campaign
        run: python -m reliabilitykit.cli.main run --workers 2 -- tests/e2e -v

      - name: Run chaos reliability campaign (chaos-marked tests)
        if: steps.chaos_decision.outputs.enable == 'true'
        continue-on-error: true
        run: |
          python -m reliabilitykit.cli.main run \
            --workers 2 \
            --chaos "${{ steps.chaos_decision.outputs.profile }}" \
            --seed "${{ steps.chaos_decision.outputs.seed }}" \
            -- tests/e2e -m chaos -v

      - name: Generate trend report
        if: always()
        run: python -m reliabilitykit.cli.main trend --window-days 30

      - name: Upload reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-artifacts-${{ github.run_id }}
          path: |
            .reliabilitykit/
            artifacts/
            .pytest_cache/
          if-no-files-found: ignore
