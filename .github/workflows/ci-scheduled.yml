name: CI Scheduled

on:
  schedule:
    - cron: "0 0,5,10,15,20 * * *"
  workflow_dispatch:
    inputs:
      seed_strategy:
        description: "Seed strategy for chaos run (daily or fixed)"
        required: false
        default: daily
        type: choice
        options:
          - daily
          - fixed

jobs:
  e2e-playwright:
    name: E2E Playwright (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e .

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Decide chaos campaign
        id: chaos_decision
        shell: bash
        run: |
          roll=$((RANDOM % 100))
          strategy="${{ github.event.inputs.seed_strategy || 'daily' }}"
          day_seed=$(date -u +%Y%m%d)
          if [ "$roll" -lt 30 ]; then
            enable=true
            profiles=(latency_light checkout_fault)
            pick=$((RANDOM % ${#profiles[@]}))
            profile="${profiles[$pick]}"
            if [ "$strategy" = "fixed" ]; then
              if [ "$profile" = "latency_light" ]; then
                seed=21
                make_target=run-chaos-ci-latency
              else
                seed=7
                make_target=run-chaos-ci-fault
              fi
            else
              checksum=$(printf "%s" "${day_seed}-${profile}" | cksum | cut -d' ' -f1)
              seed=$((checksum % 100000 + 1))
              make_target=""
            fi
          else
            enable=false
            profile=""
            seed=""
            make_target=""
          fi

          echo "enable=$enable" >> "$GITHUB_OUTPUT"
          echo "strategy=$strategy" >> "$GITHUB_OUTPUT"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "seed=$seed" >> "$GITHUB_OUTPUT"
          echo "make_target=$make_target" >> "$GITHUB_OUTPUT"

      - name: Run baseline reliability campaign
        run: python -m reliabilitykit.cli.main run --workers 2 -- tests/e2e -v

      - name: Run chaos reliability campaign (fixed-seed lane)
        if: steps.chaos_decision.outputs.enable == 'true' && steps.chaos_decision.outputs.strategy == 'fixed'
        continue-on-error: true
        run: make ${{ steps.chaos_decision.outputs.make_target }}

      - name: Run chaos reliability campaign (daily deterministic lane)
        if: steps.chaos_decision.outputs.enable == 'true' && steps.chaos_decision.outputs.strategy == 'daily'
        continue-on-error: true
        run: |
          python -m reliabilitykit.cli.main run \
            --workers 2 \
            --chaos "${{ steps.chaos_decision.outputs.profile }}" \
            --seed "${{ steps.chaos_decision.outputs.seed }}" \
            -- tests/e2e -m chaos -v

      - name: Generate trend report
        if: always()
        run: python -m reliabilitykit.cli.main trend --window-days 30

      - name: Upload reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-artifacts-${{ github.run_id }}
          path: |
            .reliabilitykit/
            artifacts/
            .pytest_cache/
          if-no-files-found: ignore
