name: CI Scheduled

on:
  schedule:
    - cron: "0 0,5,10,15,20 * * *"
  workflow_dispatch:
    inputs:
      seed_strategy:
        description: "Seed strategy for chaos run (daily or fixed)"
        required: false
        default: daily
        type: choice
        options:
          - daily
          - fixed

jobs:
  e2e-playwright:
    name: E2E Playwright (Python 3.13)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e .

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Decide chaos campaign
        id: chaos_decision
        shell: bash
        run: |
          roll=$((RANDOM % 100))
          strategy="${{ github.event.inputs.seed_strategy || 'daily' }}"
          day_seed=$(date -u +%Y%m%d)
          if [ "$roll" -lt 30 ]; then
            enable=true
            profiles=(latency_light checkout_fault rate_limit_burst auth_expired malformed_json timeout_hang resource_block fail_hard)
            pick=$((RANDOM % ${#profiles[@]}))
            profile="${profiles[$pick]}"
            if [ "$strategy" = "fixed" ]; then
              if [ "$profile" = "latency_light" ]; then
                seed=21
              elif [ "$profile" = "checkout_fault" ]; then
                seed=7
              elif [ "$profile" = "rate_limit_burst" ]; then
                seed=31
              elif [ "$profile" = "auth_expired" ]; then
                seed=41
              elif [ "$profile" = "malformed_json" ]; then
                seed=51
              elif [ "$profile" = "timeout_hang" ]; then
                seed=61
              elif [ "$profile" = "resource_block" ]; then
                seed=71
              else
                seed=99
              fi
            else
              checksum=$(printf "%s" "${day_seed}-${profile}" | cksum | cut -d' ' -f1)
              seed=$((checksum % 100000 + 1))
            fi
          else
            enable=false
            profile=""
            seed=""
          fi

          echo "enable=$enable" >> "$GITHUB_OUTPUT"
          echo "strategy=$strategy" >> "$GITHUB_OUTPUT"
          echo "profile=$profile" >> "$GITHUB_OUTPUT"
          echo "seed=$seed" >> "$GITHUB_OUTPUT"

      - name: Run baseline reliability campaign
        run: python -m reliabilitykit.cli.main run --workers 4 -- tests/e2e -v

      - name: Run chaos reliability campaign (fixed-seed lane)
        if: steps.chaos_decision.outputs.enable == 'true' && steps.chaos_decision.outputs.strategy == 'fixed'
        continue-on-error: true
        run: |
          python -m reliabilitykit.cli.main run \
            --workers 4 \
            --chaos "${{ steps.chaos_decision.outputs.profile }}" \
            --seed "${{ steps.chaos_decision.outputs.seed }}" \
            -- tests/e2e -v

      - name: Run chaos reliability campaign (daily deterministic lane)
        if: steps.chaos_decision.outputs.enable == 'true' && steps.chaos_decision.outputs.strategy == 'daily'
        continue-on-error: true
        run: |
          python -m reliabilitykit.cli.main run \
            --workers 4 \
            --chaos "${{ steps.chaos_decision.outputs.profile }}" \
            --seed "${{ steps.chaos_decision.outputs.seed }}" \
            -- tests/e2e -v

      - name: Generate trend report
        if: always()
        run: python -m reliabilitykit.cli.main trend --window-days 30

      - name: Configure AWS credentials (OIDC)
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::463470948609:role/rk-github-actions-role
          role-session-name: reliabilitykit-scheduled-ci
          aws-region: us-east-1

      - name: Sync ReliabilityKit outputs to S3
        if: always()
        run: |
          aws s3 cp .reliabilitykit/dashboard.html s3://rk-reliability/dashboard.html --cache-control "max-age=60" --content-type "text/html"
          aws s3 cp .reliabilitykit/trend.html s3://rk-reliability/trend.html --cache-control "max-age=60" --content-type "text/html"
          aws s3 sync .reliabilitykit/index/ s3://rk-reliability/index/ || true
          aws s3 sync .reliabilitykit/runs/ s3://rk-reliability/runs/

      - name: Publish dashboard URL
        if: always()
        run: |
          {
            echo "## Reliability Dashboard"
            echo "- URL: https://rk-reliability.s3.amazonaws.com/dashboard.html"
            echo "- Chaos enabled: ${{ steps.chaos_decision.outputs.enable }}"
            echo "- Chaos profile: ${{ steps.chaos_decision.outputs.profile }}"
            echo "- Chaos seed: ${{ steps.chaos_decision.outputs.seed }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-artifacts-${{ github.run_id }}
          path: |
            .reliabilitykit/
            artifacts/
            .pytest_cache/
          if-no-files-found: ignore
