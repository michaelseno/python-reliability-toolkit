name: CI Scheduled

on:
  schedule:
    - cron: "0 0,5,10,15,20 * * *"
  workflow_dispatch:
    inputs:
      fault_injection_rate:
        description: "Percent chance to inject fault in this run"
        required: false
        default: "50"
        type: string
      workers:
        description: "Pytest workers for run command"
        required: false
        default: "4"
        type: string

jobs:
  api-reliability:
    name: API Reliability Scan (Python 3.13)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e .

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Decide fault injection campaign
        id: fault_decision
        shell: bash
        run: |
          roll=$((RANDOM % 100))
          inject_rate="${{ github.event.inputs.fault_injection_rate || '50' }}"
          if ! [[ "$inject_rate" =~ ^[0-9]+$ ]]; then
            inject_rate=50
          fi
          if [ "$inject_rate" -lt 0 ]; then inject_rate=0; fi
          if [ "$inject_rate" -gt 100 ]; then inject_rate=100; fi

          if [ "$roll" -lt "$inject_rate" ]; then
            enable=true
            profiles=(latency_light checkout_fault rate_limit_burst auth_expired malformed_json timeout_hang fail_hard)
            pick=$((RANDOM % ${#profiles[@]}))
            profile="${profiles[$pick]}"
            seed=$((RANDOM % 999999 + 1))
            run_type="fault_injected"
          else
            enable=false
            profile="none"
            seed="none"
            run_type="baseline"
          fi

          echo "fault_injection_enabled=$enable" >> "$GITHUB_OUTPUT"
          echo "fault_injection_profile=$profile" >> "$GITHUB_OUTPUT"
          echo "fault_injection_seed=$seed" >> "$GITHUB_OUTPUT"
          echo "run_type=$run_type" >> "$GITHUB_OUTPUT"

      - name: Run API reliability scan (fault injected)
        if: steps.fault_decision.outputs.fault_injection_enabled == 'true'
        continue-on-error: true
        run: |
          python -m reliabilitykit.cli.main run \
            --surface api \
            --scan-pack core_reliability_scan \
            --workers "${{ github.event.inputs.workers || '4' }}" \
            --chaos "${{ steps.fault_decision.outputs.fault_injection_profile }}" \
            --seed "${{ steps.fault_decision.outputs.fault_injection_seed }}"

      - name: Run API reliability scan (baseline)
        if: steps.fault_decision.outputs.fault_injection_enabled != 'true'
        continue-on-error: true
        run: |
          python -m reliabilitykit.cli.main run \
            --surface api \
            --scan-pack core_reliability_scan \
            --workers "${{ github.event.inputs.workers || '4' }}"

      - name: Generate trend report
        if: always()
        run: python -m reliabilitykit.cli.main trend --window-days 30

      - name: Generate dashboard report
        if: always()
        run: python -m reliabilitykit.cli.main dashboard --window-days 30

      - name: Configure AWS credentials (OIDC)
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::463470948609:role/rk-github-actions-role
          role-session-name: reliabilitykit-scheduled-ci
          aws-region: us-east-1

      - name: Sync ReliabilityKit outputs to S3
        if: always()
        run: |
          aws s3 cp .reliabilitykit/dashboard.html s3://rk-reliability/dashboard.html --cache-control "max-age=60" --content-type "text/html"
          aws s3 cp .reliabilitykit/trend.html s3://rk-reliability/trend.html --cache-control "max-age=60" --content-type "text/html"
          aws s3 sync .reliabilitykit/index/ s3://rk-reliability/index/ || true
          aws s3 sync .reliabilitykit/runs/ s3://rk-reliability/runs/

      - name: Publish dashboard URL
        if: always()
        run: |
          {
            echo "## Reliability Dashboard"
            echo "- URL: https://rk-reliability.s3.amazonaws.com/dashboard.html"
            echo "- Surface: api"
            echo "- Scan pack: core_reliability_scan"
            echo "- Run type: ${{ steps.fault_decision.outputs.run_type }}"
            echo "- Fault injection enabled: ${{ steps.fault_decision.outputs.fault_injection_enabled }}"
            echo "- Fault injection profile: ${{ steps.fault_decision.outputs.fault_injection_profile }}"
            echo "- Fault injection seed: ${{ steps.fault_decision.outputs.fault_injection_seed }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-artifacts-${{ github.run_id }}
          path: |
            .reliabilitykit/
            artifacts/
            .pytest_cache/
          if-no-files-found: ignore
